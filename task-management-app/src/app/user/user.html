<app-card>
  <button [class.active]="selected" (click)="onSelectedUser()">
    <img [src]="imagePath" [alt]="user.name" />
    <span>{{ user.name }}</span>
  </button>
</app-card>

<!-- Using Signal and Compute
  <img [src]="imagePath()" [alt]="selectedUser().name" />
  property binding, sets the image source and alt text based on the selected user's avatar and name 
  <span>{{ selectedUser().name }}</span>
  string interpolation, displays the user's name -->
